services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Grupo Banzai Veracruz}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@demo.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin1234}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-nano}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
    volumes:
      # ":z" lets the container write to these folders when SELinux is enforcing
      # (AlmaLinux/RHEL). Harmless when SELinux is off.
      - ./uploads:/app/uploads:z
      - ./parsed:/app/parsed:z
      - ./db:/app/db:z

